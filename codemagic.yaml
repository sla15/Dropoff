workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22
      java: 21
      groups:
        - supabase_config   # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
        - google_maps        # VITE_GOOGLE_MAPS_API_KEY
        - firebase_config    # ALL VITE_FIREBASE_* vars + VITE_FCM_VAPID_KEY
        - android_signing    # Keystore and signing variables
      vars:
        PACKAGE_NAME: "com.dropoffgambia.customer"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web project
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew

          echo "--- DEBUGGING ENVIRONMENT ---"
          echo "Available Environment Variable Keys (names only):"
          env | cut -d= -f1 | sort | grep -E "KEY|STORE|CM_|FCI_"
          
          # Detect signing variables automatically set by the Code Signing tab
          K_FILE="$CM_KEYSTORE_PATH"
          K_STORE_PASS="$CM_KEYSTORE_PASSWORD"
          K_ALIAS="$CM_KEY_ALIAS"
          K_KEY_PASS="$CM_KEY_PASSWORD"

          echo "--- SIGNING CONFIGURATION ---"
          if [ -n "$CM_KEYSTORE_BASE64" ]; then
            echo "Base64 Keystore detected. Decoding..."
            echo $CM_KEYSTORE_BASE64 | base64 --decode > /tmp/keystore.jks
            K_FILE="/tmp/keystore.jks"
            K_STORE_PASS="$CM_KEYSTORE_PASSWORD"
            K_ALIAS="$CM_KEY_ALIAS"
            K_KEY_PASS="$CM_KEY_PASSWORD"
            
            echo "Keystore decoded successfully at: $K_FILE"
            echo "Proceeding with SIGNED build..."
            # Build both APK (for manual testing) and AAB (for Play Store)
            ./gradlew assembleRelease bundleRelease \
              -Pandroid.injected.signing.store.file="$K_FILE" \
              -Pandroid.injected.signing.store.password="$K_STORE_PASS" \
              -Pandroid.injected.signing.key.alias="$K_ALIAS" \
              -Pandroid.injected.signing.key.password="$K_KEY_PASS"
          else
            echo "FATAL ERROR: CM_KEYSTORE_BASE64 is empty or not set."
            echo "Please ensure you have added CM_KEYSTORE_BASE64 as a string variable in Codemagic."
            exit 1
          fi
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Apple Developer Codemagic"
    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dropoffgambia.customer
      groups:
        - supabase_config
        - google_maps
        - firebase_config
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web project
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Verify native patch is applied
        script: |
          echo "Verifying FirebaseMessaging.swift patch..."
          if grep -q "pendingGetTokenCompletion" node_modules/@capacitor-firebase/messaging/ios/Plugin/FirebaseMessaging.swift; then
            echo "✅ Patch verified — FirebaseMessaging.swift contains pendingGetTokenCompletion"
          else
            echo "❌ FATAL: FirebaseMessaging.swift patch is missing! Run npx patch-package to reapply."
            echo "Expected symbol 'pendingGetTokenCompletion' not found."
            exit 1
          fi
      - name: Bump build number
        script: |
          cd ios/App
          xcrun agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build iOS
        script: |
          # Force Codemagic to use the Code Signing Identities you uploaded to the UI
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

          # Archive with explicit iOS destination (avoids Xcode 26+ defaulting to macOS)
          xcodebuild -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -destination generic/platform=iOS \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Export IPA using plist generated by xcode-project use-profiles
          xcodebuild -exportArchive \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            -exportPath /Users/builder/clone/build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist
    artifacts:
      - /Users/builder/clone/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
