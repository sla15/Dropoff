workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22
      java: 21
      groups:
        - supabase_config   # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
        - google_maps        # VITE_GOOGLE_MAPS_API_KEY
        - firebase_config    # ALL VITE_FIREBASE_* vars + VITE_FCM_VAPID_KEY
        - android_signing    # Keystore and signing variables
      vars:
        PACKAGE_NAME: "com.dropoffgambia.customer"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web project
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew

          echo "--- DEBUGGING ENVIRONMENT ---"
          echo "Available Environment Variable Keys (names only):"
          env | cut -d= -f1 | sort | grep -E "KEY|STORE|CM_|FCI_"
          
          echo "Searching for .keystore files in cloning directory..."
          find $FCI_BUILD_DIR -name "*.keystore" -type f
          
          # Detect signing variables (handling both case variants)
          K_FILE="${cm_keystore:-$CM_KEYSTORE}"
          K_STORE_PASS="${cm_keystore_password:-$CM_KEYSTORE_PASSWORD}"
          K_ALIAS="${cm_key_alias:-$CM_KEY_ALIAS}"
          K_KEY_PASS="${cm_key_password:-$CM_KEY_PASSWORD}"

          echo "--- SIGNING CONFIGURATION ---"
          if [ -n "$K_FILE" ] && [ -f "$K_FILE" ]; then
            echo "Keystore detected at: $K_FILE"
            echo "Proceeding with SIGNED build..."
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$K_FILE" \
              -Pandroid.injected.signing.store.password="$K_STORE_PASS" \
              -Pandroid.injected.signing.key.alias="$K_ALIAS" \
              -Pandroid.injected.signing.key.password="$K_KEY_PASS"
          else
            echo "WARNING: Keystore not found or variables unset. K_FILE is '$K_FILE'"
            echo "Falling back to UNSIGNED build to prevent crash..."
            ./gradlew assembleRelease
          fi
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22
      xcode: latest
      groups:
        - supabase_config
        - google_maps
        - firebase_config
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web project
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath App.xcarchive archive
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist exportOptions.plist -exportPath .
    artifacts:
      - ios/App/*.ipa
